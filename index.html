<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Smooth Game</title>

<style>
body{
margin:0;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

#gameBox{
text-align:center;
}

canvas{
background:#081b24;
border:5px solid #00ffff;
border-radius:15px;
}

button{
padding:10px 20px;
margin:8px;
border:none;
border-radius:20px;
background:#00ffff;
color:#000;
font-weight:bold;
font-size:16px;
}

button:active{
transform:scale(0.95);
}

#info{
margin:10px;
font-size:18px;
}
</style>
</head>

<body>

<div id="gameBox">

<h2>🐍 Snake Smooth</h2>

<div id="info">
Score: <span id="score">0</span> |
High: <span id="high">0</span>
</div>

<canvas id="game" width="350" height="350"></canvas>

<br>

<button onclick="startGame()">▶ Start</button><br>

<button onclick="turn('up')">⬆</button><br>
<button onclick="turn('left')">⬅</button>
<button onclick="turn('down')">⬇</button>
<button onclick="turn('right')">➡</button>

</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const size=14;
const speed=80; // makin besar = makin lambat

let snake,food,dx,dy,score,loop;
let high=localStorage.getItem("snakeHigh")||0;

document.getElementById("high").innerText=high;

function startGame(){

clearInterval(loop);

snake=[
{x:175,y:175},
{x:161,y:175},
{x:147,y:175}
];

dx=size;
dy=0;

score=0;
updateScore();

spawnFood();

loop=setInterval(gameLoop,speed);
}

function spawnFood(){

food={
x:Math.floor(Math.random()*25)*size,
y:Math.floor(Math.random()*25)*size
};

}

function gameLoop(){

move();
draw();
check();

}

function move(){

let head={
x:snake[0].x+dx,
y:snake[0].y+dy
};

snake.unshift(head);

if(head.x===food.x && head.y===food.y){

score++;
updateScore();
spawnFood();

}else{
snake.pop();
}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

snake.forEach((s,i)=>{

let grad=ctx.createLinearGradient(
s.x,s.y,
s.x+size,s.y+size
);

grad.addColorStop(0,"#00f");
grad.addColorStop(1,"#f00");

ctx.fillStyle=grad;
ctx.beginPath();
ctx.roundRect(s.x,s.y,size,size,7);
ctx.fill();

});

ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(
food.x+size/2,
food.y+size/2,
size/2,0,Math.PI*2
);
ctx.fill();

}

function check(){

let h=snake[0];

// tembok
if(
h.x<0 ||
h.y<0 ||
h.x>=canvas.width ||
h.y>=canvas.height
){
gameOver();
}

// badan
for(let i=1;i<snake.length;i++){
if(h.x===snake[i].x && h.y===snake[i].y){
gameOver();
}
}

}

function gameOver(){

clearInterval(loop);

if(score>high){
high=score;
localStorage.setItem("snakeHigh",high);
document.getElementById("high").innerText=high;
}

alert("Game Over ☠️\nScore: "+score);

}

function turn(d){

if(d==="up" && dy===0){
dx=0;dy=-size;
}
if(d==="down" && dy===0){
dx=0;dy=size;
}
if(d==="left" && dx===0){
dx=-size;dy=0;
}
if(d==="right" && dx===0){
dx=size;dy=0;
}

}

// keyboard
document.addEventListener("keydown",e=>{

if(e.key==="ArrowUp")turn("up");
if(e.key==="ArrowDown")turn("down");
if(e.key==="ArrowLeft")turn("left");
if(e.key==="ArrowRight")turn("right");

});

</script>

</body>
</html>
