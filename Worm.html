<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Worm Zone Lite + AI + Customize - Grok</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #0f0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            touch-action: none;
        }
        #container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #score {
            font-size: 28px;
            margin: 10px 0;
            text-shadow: 0 0 10px #0f0;
        }
        canvas#main {
            border: 4px solid #0f0;
            box-shadow: 0 0 30px #0f0;
            image-rendering: pixelated;
        }
        #minimap {
            position: absolute;
            top: 20px;
            right: 20px;
            border: 3px solid #0f0;
            box-shadow: 0 0 15px #0f0;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 45px;
            color: #f00;
            text-shadow: 0 0 20px #f00;
            text-align: center;
            display: none;
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border-radius: 15px;
        }
        button {
            margin-top: 15px;
            padding: 15px 30px;
            font-size: 22px;
            background: #0f0;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Joystick */
        #joystick {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 130px;
            height: 130px;
            z-index: 10;
        }
        #joystick-base {
            position: absolute;
            width: 130px;
            height: 130px;
            background: rgba(0, 255, 0, 0.25);
            border: 5px solid #0f0;
            border-radius: 50%;
        }
        #joystick-knob {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #0f0;
            border-radius: 50%;
            top: 40px;
            left: 40px;
            box-shadow: 0 0 15px #0f0;
            transition: transform 0.05s;
        }
        #leaderboard {
            margin-top: 15px;
            width: 90%;
            max-width: 380px;
            background: rgba(0,0,0,0.7);
            border: 3px solid #0f0;
            border-radius: 10px;
            padding: 10px;
        }
        #leaderboard h3 {
            margin: 0 0 8px 0;
            text-align: center;
            color: #0f0;
        }
        #score-list li {
            padding: 4px 10px;
            font-size: 18px;
        }

        /* Customize Panel */
        #customizePanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            border: 4px solid #0f0;
            border-radius: 15px;
            padding: 25px;
            width: 90%;
            max-width: 420px;
            color: #0f0;
            text-align: center;
            display: none;
            z-index: 20;
            box-shadow: 0 0 30px #0f0;
        }
        #customizePanel h3 {
            margin: 0 0 20px 0;
            font-size: 28px;
        }
        .custom-section {
            margin-bottom: 25px;
        }
        .custom-section h4 {
            margin: 0 0 10px 0;
            font-size: 20px;
        }
        input[type="color"] {
            width: 100%;
            height: 60px;
            border: 3px solid #0f0;
            border-radius: 8px;
            cursor: pointer;
        }
        .food-options {
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .food-btn {
            padding: 12px 20px;
            font-size: 18px;
            background: rgba(0,255,0,0.2);
            border: 3px solid #0f0;
            border-radius: 12px;
            color: #0f0;
        }
        .food-btn.active {
            background: #0f0;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="score">Skor: 0</div>
        <canvas id="main" width="400" height="400"></canvas>
        <canvas id="minimap" width="120" height="120"></canvas>

        <!-- Joystick -->
        <div id="joystick">
            <div id="joystick-base"></div>
            <div id="joystick-knob"></div>
        </div>

        <div id="leaderboard">
            <h3>🏆 Peringkat Worm Zone</h3>
            <ul id="score-list" style="list-style:none; padding:0; margin:0;"></ul>
        </div>

        <button id="customizeBtn" style="margin-top: 15px; font-size: 20px;">Customize 🛠️</button>

        <div id="gameOver">
            GAME OVER!<br>
            <button onclick="restart()">Main Lagi</button>
        </div>

        <!-- Customize Panel -->
        <div id="customizePanel">
            <h3>🌟 Customize Worm Zone</h3>
            
            <div class="custom-section">
                <h4>Warna Ular (Skin Worm)</h4>
                <input type="color" id="playerColorPicker" value="#0f0">
            </div>
            
            <div class="custom-section">
                <h4>Tipe Makanan</h4>
                <div class="food-options">
                    <button class="food-btn" data-style="apple" onclick="selectFoodType(this)">🍎 Classic Apple</button>
                    <button class="food-btn" data-style="star" onclick="selectFoodType(this)">⭐ Golden Star</button>
                    <button class="food-btn" data-style="gem" onclick="selectFoodType(this)">🔷 Blue Gem</button>
                </div>
            </div>
            
            <button onclick="closeCustomize()" style="background:#f00; color:#fff; width:100%; margin-top:20px;">Tutup Panel</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("main");
        const ctx = canvas.getContext("2d");
        const miniCanvas = document.getElementById("minimap");
        const miniCtx = miniCanvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const gameOverElement = document.getElementById("gameOver");
        const knob = document.getElementById("joystick-knob");

        const grid = 25;
        let count = 0;
        let score = 0;
        let gameOverFlag = false;
        let gameSpeed = 7;

        let snake = [
            {x: 200, y: 200},
            {x: 175, y: 200},
            {x: 150, y: 200},
            {x: 125, y: 200}
        ];
        let dx = grid;
        let dy = 0;

        let food = {x: 300, y: 300};

        // Customization variables
        let playerColor = '#0f0';
        let foodStyle = 'apple'; // 'apple', 'star', 'gem'

        // Bot AI (musuh)
        let bots = [];
        const botColors = ["#00f", "#a0f", "#ff0"];
        function spawnBot() {
            const startX = Math.floor(Math.random() * (canvas.width / grid - 4) + 2) * grid;
            const startY = Math.floor(Math.random() * (canvas.height / grid - 4) + 2) * grid;
            bots.push({
                positions: [
                    {x: startX, y: startY},
                    {x: startX - grid, y: startY},
                    {x: startX - 2*grid, y: startY}
                ],
                dx: grid,
                dy: 0,
                color: botColors[Math.floor(Math.random() * botColors.length)],
                alive: true
            });
        }
        for (let i = 0; i < 3; i++) spawnBot();

        let highScores = [];

        function loadHighScores() {
            const saved = localStorage.getItem('wormHighScores');
            if (saved) highScores = JSON.parse(saved);
            else {
                highScores = [
                    {name: "GamerPro", score: 920},
                    {name: "WormBoss", score: 780},
                    {name: "ZoneLegend", score: 650}
                ];
            }
            renderLeaderboard();
        }

        function renderLeaderboard() {
            const list = document.getElementById("score-list");
            list.innerHTML = "";
            highScores.sort((a, b) => b.score - a.score);
            highScores.slice(0, 8).forEach((item, i) => {
                const li = document.createElement("li");
                li.textContent = `#${i+1} ${item.name} — ${item.score}`;
                list.appendChild(li);
            });
        }

        function addToLeaderboard(name, newScore) {
            highScores.push({name, score: newScore});
            highScores.sort((a, b) => b.score - a.score);
            highScores = highScores.slice(0, 10);
            localStorage.setItem('wormHighScores', JSON.stringify(highScores));
            renderLeaderboard();
        }

        function loadCustomization() {
            const savedColor = localStorage.getItem('wormPlayerColor');
            if (savedColor) playerColor = savedColor;
            const savedFood = localStorage.getItem('wormFoodStyle');
            if (savedFood) foodStyle = savedFood;
            
            // Update picker
            document.getElementById("playerColorPicker").value = playerColor;
            
            // Set active food button
            document.querySelectorAll('.food-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.style === foodStyle);
            });
        }

        function randomFood() {
            food.x = Math.floor(Math.random() * (canvas.width / grid)) * grid;
            food.y = Math.floor(Math.random() * (canvas.height / grid)) * grid;
        }

        function shadeColor(color, percent) {
            let R = parseInt(color.substring(1,3),16);
            let G = parseInt(color.substring(3,5),16);
            let B = parseInt(color.substring(5,7),16);
            R = parseInt(R * (1 + percent));
            G = parseInt(G * (1 + percent));
            B = parseInt(B * (1 + percent));
            R = (R<255)?R:255; G = (G<255)?G:255; B = (B<255)?B:255;
            let RR = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
            let GG = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
            let BB = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));
            return "#"+RR+GG+BB;
        }

        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let step = Math.PI / spikes;
            ctx.beginPath();
            ctx.moveTo(cx + outerRadius * Math.cos(rot), cy + outerRadius * Math.sin(rot));
            for (let i = 0; i < spikes; i++) {
                let x = cx + Math.cos(rot) * outerRadius;
                let y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;
                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.closePath();
            ctx.fill();
        }

        function getFoodColor() {
            if (foodStyle === 'star') return '#ff0';
            if (foodStyle === 'gem') return '#00f';
            return '#f00';
        }

        function draw() {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Pemain
            ctx.shadowBlur = 15;
            ctx.shadowColor = playerColor;
            for (let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i === 0) ? playerColor : shadeColor(playerColor, -0.4);
                ctx.fillRect(snake[i].x, snake[i].y, grid, grid);
                ctx.strokeStyle = "#000";
                ctx.lineWidth = 3;
                ctx.strokeRect(snake[i].x + 3, snake[i].y + 3, grid - 6, grid - 6);
            }
            ctx.shadowBlur = 0;

            // Bot musuh
            bots.forEach(bot => {
                if (!bot.alive) return;
                ctx.shadowBlur = 15;
                ctx.shadowColor = bot.color;
                for (let i = 0; i < bot.positions.length; i++) {
                    ctx.fillStyle = (i === 0) ? bot.color : shadeColor(bot.color, -0.4);
                    ctx.fillRect(bot.positions[i].x, bot.positions[i].y, grid, grid);
                    ctx.strokeStyle = "#000";
                    ctx.lineWidth = 3;
                    ctx.strokeRect(bot.positions[i].x + 3, bot.positions[i].y + 3, grid - 6, grid - 6);
                }
                ctx.shadowBlur = 0;
            });

            // Makanan (custom tipe)
            const centerX = food.x + grid / 2;
            const centerY = food.y + grid / 2;
            ctx.shadowBlur = 25;
            ctx.shadowColor = getFoodColor();
            ctx.fillStyle = getFoodColor();
            if (foodStyle === 'apple') {
                ctx.beginPath();
                ctx.arc(centerX, centerY, grid/2 - 3, 0, Math.PI * 2);
                ctx.fill();
            } else if (foodStyle === 'star') {
                drawStar(ctx, centerX, centerY, 5, grid/2 - 2, grid/4);
            } else if (foodStyle === 'gem') {
                ctx.fillRect(food.x + 3, food.y + 3, grid - 6, grid - 6);
            }
            ctx.shadowBlur = 0;

            drawMinimap();
        }

        function drawMinimap() {
            const scale = 120 / 400;
            miniCtx.fillStyle = "#111";
            miniCtx.fillRect(0, 0, 120, 120);

            // Pemain
            miniCtx.shadowBlur = 8;
            miniCtx.shadowColor = playerColor;
            for (let i = 0; i < snake.length; i++) {
                miniCtx.fillStyle = (i === 0) ? playerColor : shadeColor(playerColor, -0.4);
                miniCtx.fillRect(snake[i].x * scale, snake[i].y * scale, grid * scale, grid * scale);
            }

            // Bot
            bots.forEach(bot => {
                if (!bot.alive) return;
                miniCtx.shadowColor = bot.color;
                for (let i = 0; i < bot.positions.length; i++) {
                    miniCtx.fillStyle = (i === 0) ? bot.color : shadeColor(bot.color, -0.4);
                    miniCtx.fillRect(bot.positions[i].x * scale, bot.positions[i].y * scale, grid * scale, grid * scale);
                }
            });
            miniCtx.shadowBlur = 0;

            // Makanan minimap (simple)
            miniCtx.shadowBlur = 12;
            miniCtx.shadowColor = getFoodColor();
            miniCtx.fillStyle = getFoodColor();
            if (foodStyle === 'apple' || foodStyle === 'star') {
                miniCtx.fillRect(food.x * scale, food.y * scale, grid * scale, grid * scale);
            } else {
                miniCtx.fillRect(food.x * scale + 2, food.y * scale + 2, grid * scale - 4, grid * scale - 4);
            }
            miniCtx.shadowBlur = 0;
        }

        function update() {
            if (gameOverFlag) return;

            count++;
            if (count < gameSpeed) return;
            count = 0;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
                endGame();
                return;
            }

            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) endGame();
            }
            bots.forEach(bot => {
                if (!bot.alive) return;
                bot.positions.forEach(pos => {
                    if (head.x === pos.x && head.y === pos.y) endGame();
                });
            });

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = `Skor: ${score}`;
                randomFood();
                if (score % 50 === 0 && gameSpeed > 4) gameSpeed--;
            } else {
                snake.pop();
            }

            // Update bot AI (sama seperti sebelumnya)
            bots.forEach(bot => {
                if (!bot.alive) return;
                let targetDx = 0, targetDy = 0;
                const dxFood = food.x - bot.positions[0].x;
                const dyFood = food.y - bot.positions[0].y;
                if (Math.abs(dxFood) > Math.abs(dyFood)) {
                    targetDx = dxFood > 0 ? grid : -grid;
                } else {
                    targetDy = dyFood > 0 ? grid : -grid;
                }
                if (Math.random() < 0.3) {
                    const dirs = [grid, -grid];
                    targetDx = dirs[Math.floor(Math.random()*2)];
                    targetDy = 0;
                    if (Math.random() < 0.5) {
                        targetDx = 0;
                        targetDy = dirs[Math.floor(Math.random()*2)];
                    }
                }
                if (targetDx !== -bot.dx || targetDy !== -bot.dy) {
                    bot.dx = targetDx;
                    bot.dy = targetDy;
                }
                const botHead = {x: bot.positions[0].x + bot.dx, y: bot.positions[0].y + bot.dy};
                if (botHead.x < 0 || botHead.x >= canvas.width || botHead.y < 0 || botHead.y >= canvas.height) {
                    bot.dx = -bot.dx;
                    bot.dy = -bot.dy;
                    return;
                }
                let botHit = false;
                for (let i = 0; i < bot.positions.length; i++) {
                    if (botHead.x === bot.positions[i].x && botHead.y === bot.positions[i].y) botHit = true;
                }
                snake.forEach(pos => {
                    if (botHead.x === pos.x && botHead.y === pos.y) botHit = true;
                });
                if (botHit) {
                    bot.alive = false;
                    setTimeout(() => spawnBot(), 3000);
                    return;
                }
                bot.positions.unshift(botHead);
                if (botHead.x === food.x && botHead.y === food.y) {
                    randomFood();
                } else {
                    bot.positions.pop();
                }
            });
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameOverFlag = true;
            gameOverElement.style.display = "block";
            const name = prompt(`🎮 GAME OVER!\nSkor kamu: ${score}\nMasukkan nama untuk masuk peringkat:`, "Kamu");
            addToLeaderboard(name || "Anonymous", score);
        }

        function restart() {
            snake = [
                {x: 200, y: 200},
                {x: 175, y: 200},
                {x: 150, y: 200},
                {x: 125, y: 200}
            ];
            dx = grid;
            dy = 0;
            score = 0;
            gameSpeed = 7;
            scoreElement.textContent = `Skor: 0`;
            gameOverElement.style.display = "none";
            gameOverFlag = false;
            randomFood();
            bots = [];
            for (let i = 0; i < 3; i++) spawnBot();
        }

        // Joystick logic (sama seperti sebelumnya)
        let dragging = false;
        const JOYSTICK_RADIUS = 60;
        const DEAD_ZONE = 20;

        function handleJoystick(clientX, clientY) {
            const rect = document.getElementById("joystick").getBoundingClientRect();
            const centerX = rect.left + 65;
            const centerY = rect.top + 65;
            let deltaX = clientX - centerX;
            let deltaY = clientY - centerY;
            let distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            if (distance > JOYSTICK_RADIUS) {
                deltaX = (deltaX / distance) * JOYSTICK_RADIUS;
                deltaY = (deltaY / distance) * JOYSTICK_RADIUS;
            }
            knob.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
            if (distance > DEAD_ZONE) {
                if (Math.abs(deltaX) > Math.abs(deltaY)) {
                    if (deltaX > 0 && dx !== -grid) { dx = grid; dy = 0; }
                    else if (deltaX < 0 && dx !== grid) { dx = -grid; dy = 0; }
                } else {
                    if (deltaY > 0 && dy !== -grid) { dx = 0; dy = grid; }
                    else if (deltaY < 0 && dy !== grid) { dx = 0; dy = -grid; }
                }
            }
        }

        const joystickContainer = document.getElementById("joystick");
        joystickContainer.addEventListener("touchstart", e => {
            if (gameOverFlag) return;
            dragging = true;
            handleJoystick(e.touches[0].clientX, e.touches[0].clientY);
        });
        document.addEventListener("touchmove", e => {
            if (!dragging || gameOverFlag) return;
            e.preventDefault();
            handleJoystick(e.touches[0].clientX, e.touches[0].clientY);
        });
        document.addEventListener("touchend", () => {
            dragging = false;
            knob.style.transform = "translate(0px, 0px)";
        });

        // Customize functions
        function selectFoodType(btn) {
            foodStyle = btn.dataset.style;
            localStorage.setItem('wormFoodStyle', foodStyle);
            document.querySelectorAll('.food-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function closeCustomize() {
            document.getElementById("customizePanel").style.display = "none";
        }

        // Event listeners
        document.getElementById("customizeBtn").addEventListener("click", () => {
            if (!gameOverFlag) document.getElementById("customizePanel").style.display = "block";
        });

        document.getElementById("playerColorPicker").addEventListener("input", (e) => {
            playerColor = e.target.value;
            localStorage.setItem('wormPlayerColor', playerColor);
        });

        // Mulai game
        loadHighScores();
        loadCustomization();
        randomFood();
        gameLoop();
    </script>
</body>
</html>
